<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commento · Officina critica</title>
<meta name="description" content="Composizione guidata del commento al testo letterario, secondo il protocollo di analisi in cinque fasi (con variante filologica per greco e latino).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/design.css">
</head>
<body>

<header class="topbar">
  <a class="brand" href="index.html">Commento<small>Officina critica</small></a>
  <div class="crumb" id="crumbWrap" style="display:none"><span id="crumb"></span></div>
  <div class="actions">
    <span class="save-dot" id="saveDot">Salvato</span>
    <a class="btn ghost sm" href="analisi.html">Analisi</a>
    <button class="btn ghost sm" id="btnChooser">Scegli passo</button>
    <button class="btn ghost sm" id="btnExport" style="display:none">Esporta</button>
  </div>
</header>

<!-- Scelta del passo -->
<section id="view-chooser">
  <div class="archive">
    <div class="archive-head">
      <h1>Comporre il commento</h1>
      <p>Scegli un passo del tuo archivio: lo strumento ti guida fase per fase e mette accanto le annotazioni che hai raccolto.</p>
    </div>
    <div class="passi-grid" id="passiGrid"></div>
  </div>
</section>

<!-- Workspace di commento -->
<section id="view-workspace" style="display:none">
  <div class="commento-wrap">

    <div class="work-meta">
      <div class="wm-author" id="wmAuthor"></div>
      <div class="wm-title" id="wmTitle"></div>
      <div class="wm-sub" id="wmSub"></div>
    </div>

    <div class="proto-row">
      <div class="mode-toggle" id="protoToggle">
        <button data-modo="moderno">Italiano / moderno</button>
        <button data-modo="classico">Greco / latino</button>
      </div>
      <button class="btn ghost sm" id="btnVademecum">Vademecum ▾</button>
    </div>

    <div class="vademecum" id="vademecum">
      <div class="vade-row vade-head"><div>Livello</div><div>Cosa cercare</div><div>Errore</div></div>
      <div id="vademecumBody"></div>
    </div>

    <div class="domande-chiave" id="domandeChiave" style="display:none"></div>

    <div id="textHost"></div>

    <div class="progress"><div class="progress-track"><div class="progress-bar" id="progressBar"></div></div><span id="progressLabel"></span></div>

    <div id="fasiHost"></div>

    <p class="principio" id="principio"></p>

    <div style="text-align:center;margin:24px 0 60px">
      <button class="btn primary" id="btnExport2" onclick="document.getElementById('btnExport').click()">Esporta il commento (Markdown)</button>
    </div>

  </div>
</section>

<div class="toast" id="toast"></div>

<script src="data/taxonomy.js"></script>
<script src="data/commento.js"></script>
<script src="assets/commento.js"></script>
</body>
</html>
