<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interpretazione guidata · Officina critica</title>
<meta name="description" content="Foglio di lavoro per l'interpretazione guidata del testo letterario: identikit, decodifica, involucro formale, smontaggio retorico, sintesi critica.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/design.css">
</head>
<body>

<header class="topbar">
  <a class="brand" href="index.html">Interpretazione<small>Officina critica</small></a>
  <div class="crumb" id="crumbWrap" style="display:none"><span id="crumb"></span></div>
  <div class="actions">
    <span class="save-dot" id="saveDot">Salvato</span>
    <a class="btn ghost sm" href="analisi.html">Analisi</a>
    <a class="btn ghost sm" href="commento.html">Commento</a>
    <button class="btn ghost sm" id="btnChooser">Scegli passo</button>
    <button class="btn ghost sm" id="btnExport" style="display:none">Esporta</button>
  </div>
</header>

<!-- Scelta del passo -->
<section id="view-chooser">
  <div class="archive">
    <div class="archive-head">
      <h1>Interpretazione guidata</h1>
      <p>Un foglio di lavoro che ti accompagna dall'osservazione alla tesi critica. Scegli un passo: i campi si possono compilare a mano o importare dalle tue annotazioni.</p>
    </div>
    <div class="passi-grid" id="passiGrid"></div>
  </div>
</section>

<!-- Workspace -->
<section id="view-workspace" style="display:none">
  <div class="commento-wrap">

    <div class="work-meta">
      <div class="wm-author" id="wmAuthor"></div>
      <div class="wm-title" id="wmTitle"></div>
      <div class="wm-sub" id="wmSub"></div>
    </div>

    <div class="consiglio-box"><span class="consiglio-label">💡 Come usarla</span><p id="consiglio"></p></div>

    <div class="progress"><div class="progress-track"><div class="progress-bar" id="progressBar"></div></div><span id="progressLabel"></span></div>

    <div id="sezioniHost"></div>

    <div style="text-align:center;margin:24px 0 60px">
      <button class="btn primary" onclick="document.getElementById('btnExport').click()">Esporta la scheda (Markdown)</button>
    </div>

  </div>
</section>

<div class="toast" id="toast"></div>

<script src="data/taxonomy.js"></script>
<script src="data/interpretazione.js"></script>
<script src="data/ricezione.js"></script>
<script src="assets/interpretazione.js"></script>
</body>
</html>
